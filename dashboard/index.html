<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aut8ma — Oficina de Agentes</title>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--pink:#ec4899;--purple:#a855f7;--cyan:#06b6d4;--teal:#14b8a6;--gold:#f59e0b;--magenta:#d946ef;--text:#e2e8f0;--muted:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;background:linear-gradient(90deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .stats{display:flex;gap:20px}
.stat{text-align:center;padding:8px 16px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.stat .num{font-size:20px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase}
.tabs{display:flex;gap:4px;padding:15px 30px;background:var(--card);border-bottom:1px solid var(--border)}
.tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;border:1px solid transparent;transition:all .2s;color:var(--muted)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--border);color:var(--text)}
.office{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:20px 30px}
.agent-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s;position:relative;overflow:hidden}
.agent-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(249,115,22,.1)}
.agent-card .color-bar{position:absolute;top:0;left:0;right:0;height:3px}
.agent-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.agent-card .name{font-size:16px;font-weight:700}
.agent-card .model{font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--muted)}
.agent-card .role{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.agent-card .status{display:flex;align-items:center;gap:6px;font-size:12px;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.03)}
.status-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.agent-card .task{font-size:11px;color:var(--muted);margin-top:8px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px;border-left:2px solid var(--border)}
.agent-card .actions{display:flex;gap:6px;margin-top:12px}
.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#ea580c}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:15px}
.modal textarea{width:100%;height:120px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:13px;resize:vertical;font-family:inherit}
.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal .modal-actions{display:flex;gap:8px;margin-top:15px;justify-content:flex-end}
.modal select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:12px}
.log{padding:20px 30px}
.log-entry{padding:10px 15px;border-left:3px solid var(--border);margin-bottom:8px;font-size:12px;background:var(--card);border-radius:0 8px 8px 0}
.log-entry .time{color:var(--muted);margin-right:8px}
.log-entry .agent-tag{padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:6px}
.team-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:15px 30px 5px;font-weight:600}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>aut8ma — Oficina de Agentes</h1>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Sistema Multi-Agente · Venezuela 2026</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="num" id="total-agents">22</div><div class="label">Agentes</div></div>
    <div class="stat"><div class="num" id="active-count">0</div><div class="label">Activos</div></div>
    <div class="stat"><div class="num" id="task-count">0</div><div class="label">Tareas Hoy</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTeam('all')">Todos</div>
  <div class="tab" onclick="showTeam('automation')">Automation</div>
  <div class="tab" onclick="showTeam('video')">Video</div>
  <div class="tab" onclick="showTeam('business')">Business</div>
  <div class="tab" onclick="showTeam('log')">Activity Log</div>
</div>

<div id="office" class="office"></div>
<div id="log-view" class="log" style="display:none"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Asignar Tarea</h2>
    <select id="modal-agent"></select>
    <textarea id="modal-task" placeholder="Describe la tarea para este agente..."></textarea>
    <div style="margin-top:10px">
      <label style="font-size:12px;color:var(--muted)">Prioridad:</label>
      <select id="modal-priority" style="width:auto;display:inline;margin-left:8px">
        <option value="normal">Normal</option>
        <option value="alta">Alta</option>
        <option value="urgente">Urgente</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="assignTask()">Asignar</button>
    </div>
  </div>
</div>

<script>
const agents = [
  // Automation Team
  {id:'aria',name:'ARIA',role:'Orquestador de Automatizaciones',team:'automation',color:'var(--accent)',model:'opus',status:'idle',task:''},
  {id:'nexarch',name:'NEXARCH',role:'Arquitecto N8N — diseña nodos y flujos',team:'automation',color:'var(--blue)',model:'opus',status:'idle',task:''},
  {id:'jsoncraft',name:'JSONCRAFT',role:'Constructor JSON N8N (max 15 nodos/parte)',team:'automation',color:'var(--purple)',model:'sonnet',status:'idle',task:''},
  {id:'scribe',name:'SCRIBE',role:'Escritor de Prompts B (chatbot IA)',team:'automation',color:'var(--green)',model:'sonnet',status:'idle',task:''},
  {id:'qagate',name:'QA-GATE',role:'Validador de calidad (26 items Block 5.3)',team:'automation',color:'var(--red)',model:'sonnet',status:'idle',task:''},
  // Video Team
  {id:'vora',name:'VORA',role:'Orquestador de Video',team:'video',color:'var(--accent)',model:'opus',status:'idle',task:''},
  {id:'blueprint',name:'BLUEPRINT',role:'Blueprints de edicion Victor Heras',team:'video',color:'var(--blue)',model:'opus',status:'idle',task:''},
  {id:'lens',name:'LENS',role:'Analizador de videos de referencia',team:'video',color:'var(--cyan)',model:'sonnet',status:'idle',task:''},
  {id:'scout',name:'SCOUT',role:'Buscador de recursos (B-roll, SFX, musica)',team:'video',color:'var(--yellow)',model:'sonnet',status:'idle',task:''},
  {id:'configura',name:'CONFIGURA',role:'Configurador tecnico CapCut',team:'video',color:'var(--teal)',model:'sonnet',status:'idle',task:''},
  // Business Team
  {id:'ceo',name:'CEO',role:'Director General — orquesta los 12 co-propietarios',team:'business',color:'var(--gold)',model:'opus',status:'idle',task:''},
  {id:'guionista',name:'GUIONISTA',role:'Guiones estilo Victor Heras para TikTok/Reels/Shorts',team:'business',color:'var(--accent)',model:'opus',status:'idle',task:''},
  {id:'ideador',name:'IDEADOR',role:'Ideas de contenido y calendarios de redes',team:'business',color:'var(--yellow)',model:'sonnet',status:'idle',task:''},
  {id:'director',name:'DIRECTOR-CREATIVO',role:'Supervision de calidad creativa y marca',team:'business',color:'var(--blue)',model:'opus',status:'idle',task:''},
  {id:'contador',name:'CONTADOR',role:'Precios, tasas venezolanas, cotizaciones, ROI',team:'business',color:'var(--green)',model:'opus',status:'idle',task:''},
  {id:'estratega',name:'ESTRATEGA',role:'Campanas de marketing y crecimiento',team:'business',color:'var(--red)',model:'opus',status:'idle',task:''},
  {id:'community',name:'COMMUNITY',role:'Redes sociales, copys, calendario de publicaciones',team:'business',color:'var(--pink)',model:'sonnet',status:'idle',task:''},
  {id:'promos',name:'PROMOS',role:'Promociones, descuentos y programa de fidelidad',team:'business',color:'var(--magenta)',model:'sonnet',status:'idle',task:''},
  {id:'closer',name:'CLOSER',role:'Scripts de venta, cierre y manejo de objeciones',team:'business',color:'var(--red)',model:'sonnet',status:'idle',task:''},
  {id:'analista',name:'ANALISTA',role:'Mercado, competencia, tendencias de IA',team:'business',color:'var(--cyan)',model:'sonnet',status:'idle',task:''},
  {id:'lanzador',name:'LANZADOR',role:'Planificacion de lanzamientos de productos',team:'business',color:'var(--accent)',model:'sonnet',status:'idle',task:''},
  {id:'fidelidad',name:'FIDELIDAD',role:'Retencion, onboarding, anti-desercion (>95%)',team:'business',color:'var(--green)',model:'sonnet',status:'idle',task:''},
  {id:'brandmaster',name:'BRANDMASTER',role:'Identidad de marca y consistencia de mensajes',team:'business',color:'var(--purple)',model:'sonnet',status:'idle',task:''},
];

const activityLog = [];
let currentTeam = 'all';

function addLog(agentName, action, color) {
  const now = new Date();
  const time = now.toLocaleTimeString('es-VE', {hour:'2-digit',minute:'2-digit'});
  activityLog.unshift({time, agent: agentName, action, color});
  if (activityLog.length > 50) activityLog.pop();
  renderLog();
}

function renderLog() {
  const el = document.getElementById('log-view');
  el.innerHTML = activityLog.map(l => `
    <div class="log-entry">
      <span class="time">${l.time}</span>
      <span class="agent-tag" style="background:${l.color};color:#fff">${l.agent}</span>
      ${l.action}
    </div>
  `).join('') || '<div style="padding:20px;color:var(--muted);text-align:center">Sin actividad registrada</div>';
}

function renderAgents() {
  const office = document.getElementById('office');
  const filtered = currentTeam === 'all' ? agents : agents.filter(a => a.team === currentTeam);

  let html = '';
  let lastTeam = '';

  filtered.forEach(a => {
    if (currentTeam === 'all' && a.team !== lastTeam) {
      lastTeam = a.team;
      const teamNames = {automation:'AUTOMATION TEAM',video:'VIDEO TEAM',business:'BUSINESS TEAM — Co-Propietarios'};
      html += `<div style="grid-column:1/-1" class="team-label">${teamNames[a.team]}</div>`;
    }

    const statusColors = {idle:'var(--muted)',working:'var(--green)',review:'var(--yellow)',blocked:'var(--red)'};
    const statusLabels = {idle:'En espera',working:'Trabajando',review:'En revision',blocked:'Bloqueado'};

    html += `
    <div class="agent-card" data-team="${a.team}" id="card-${a.id}">
      <div class="color-bar" style="background:${a.color}"></div>
      <div class="top">
        <div class="name" style="color:${a.color}">${a.name}</div>
        <div class="model">${a.model}</div>
      </div>
      <div class="role">${a.role}</div>
      <div class="status">
        <div class="status-dot" style="background:${statusColors[a.status]}${a.status==='idle'?';animation:none':''}"></div>
        ${statusLabels[a.status]}
      </div>
      ${a.task ? `<div class="task">${a.task}</div>` : ''}
      <div class="actions">
        <button class="btn primary" onclick="openModal('${a.id}')">Asignar Tarea</button>
        <button class="btn" onclick="toggleStatus('${a.id}')">Cambiar Estado</button>
        ${a.task ? `<button class="btn" onclick="clearTask('${a.id}')" style="color:var(--red)">Limpiar</button>` : ''}
      </div>
    </div>`;
  });

  office.innerHTML = html;
  updateStats();
}

function updateStats() {
  document.getElementById('active-count').textContent = agents.filter(a => a.status === 'working').length;
  document.getElementById('task-count').textContent = agents.filter(a => a.task).length;
}

function showTeam(team) {
  currentTeam = team;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  if (team === 'log') {
    document.getElementById('office').style.display = 'none';
    document.getElementById('log-view').style.display = 'block';
    renderLog();
  } else {
    document.getElementById('office').style.display = 'grid';
    document.getElementById('log-view').style.display = 'none';
    renderAgents();
  }
}

function openModal(agentId) {
  const modal = document.getElementById('modal');
  const select = document.getElementById('modal-agent');
  select.innerHTML = agents.map(a => `<option value="${a.id}" ${a.id===agentId?'selected':''}>${a.name} — ${a.role}</option>`).join('');
  document.getElementById('modal-task').value = '';
  document.getElementById('modal-title').textContent = `Asignar Tarea a ${agents.find(a=>a.id===agentId).name}`;
  modal.classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function assignTask() {
  const agentId = document.getElementById('modal-agent').value;
  const task = document.getElementById('modal-task').value.trim();
  const priority = document.getElementById('modal-priority').value;
  if (!task) return;

  const agent = agents.find(a => a.id === agentId);
  const priorityTag = priority !== 'normal' ? ` [${priority.toUpperCase()}]` : '';
  agent.task = task + priorityTag;
  agent.status = 'working';

  addLog(agent.name, `Nueva tarea: "${task.substring(0,60)}${task.length>60?'...':''}"${priorityTag}`, agent.color);
  closeModal();
  renderAgents();
}

function toggleStatus(agentId) {
  const agent = agents.find(a => a.id === agentId);
  const states = ['idle','working','review','blocked'];
  const idx = states.indexOf(agent.status);
  agent.status = states[(idx + 1) % states.length];
  addLog(agent.name, `Estado cambiado a: ${agent.status}`, agent.color);
  renderAgents();
}

function clearTask(agentId) {
  const agent = agents.find(a => a.id === agentId);
  addLog(agent.name, `Tarea completada: "${agent.task.substring(0,40)}..."`, agent.color);
  agent.task = '';
  agent.status = 'idle';
  renderAgents();
}

// Init
renderAgents();
renderLog();
</script>
</body>
</html>
